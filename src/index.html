<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloatInk</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 浮动工具栏 -->
  <div id="toolbar" class="toolbar">
    <!-- 颜色选择 -->
    <div class="toolbar-group colors">
      <button class="color-btn active" data-color="#FF3B30" style="background:#FF3B30" title="红色"></button>
      <button class="color-btn" data-color="#FF9500" style="background:#FF9500" title="橙色"></button>
      <button class="color-btn" data-color="#FFCC00" style="background:#FFCC00" title="黄色"></button>
      <button class="color-btn" data-color="#34C759" style="background:#34C759" title="绿色"></button>
      <button class="color-btn" data-color="#007AFF" style="background:#007AFF" title="蓝色"></button>
      <button class="color-btn" data-color="#FFFFFF" style="background:#FFFFFF" title="白色"></button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- 工具选择 -->
    <div class="toolbar-group tools">
      <!-- 画笔 -->
      <button class="tool-btn active" data-tool="pen" title="画笔">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
      </button>

      <!-- 马克笔/高亮 -->
      <button class="tool-btn" data-tool="marker" title="马克笔">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 20h4l10.5-10.5a2.828 2.828 0 00-4-4L4 16v4z"/>
          <path d="M13.5 6.5l4 4"/>
          <path d="M2 22h20"/>
        </svg>
      </button>

      <!-- 箭头 -->
      <button class="tool-btn" data-tool="arrow" title="箭头">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
          <polyline points="12 5 19 5 19 12"/>
        </svg>
      </button>

      <!-- 对勾 -->
      <button class="tool-btn" data-tool="check" title="对勾">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>

      <!-- 直线 -->
      <button class="tool-btn" data-tool="line" title="直线">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="20" x2="20" y2="4"/>
        </svg>
      </button>

      <!-- 矩形 -->
      <button class="tool-btn" data-tool="rect" title="矩形">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
      </button>

      <!-- 椭圆 -->
      <button class="tool-btn" data-tool="ellipse" title="椭圆">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <ellipse cx="12" cy="12" rx="10" ry="7"/>
        </svg>
      </button>

      <!-- 文字 -->
      <button class="tool-btn" data-tool="text" title="文字">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 20 4 20 7"/>
          <line x1="9.5" y1="20" x2="14.5" y2="20"/>
          <line x1="12" y1="4" x2="12" y2="20"/>
        </svg>
      </button>

      <!-- 激光笔 -->
      <button class="tool-btn" data-tool="laser" title="激光笔">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
          <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
          <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- 画笔大小 -->
    <div class="toolbar-group size-control">
      <span class="size-label">粗细</span>
      <input id="size-slider" class="size-slider" type="range" min="1" max="24" step="1" value="3" title="画笔大小">
      <span id="size-value" class="size-value">3px</span>
    </div>

    <div class="toolbar-divider"></div>

    <!-- 操作按钮 -->
    <div class="toolbar-group actions">
      <!-- 撤销 -->
      <button class="tool-btn" id="undo-btn" title="撤销 (⌘Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>

      <!-- 一键清空 -->
      <button class="tool-btn" id="clear-btn" title="一键清空所有绘制">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h13"/>
          <path d="M8 6V4h8v2"/>
          <path d="M7 6l1 14h8l1-14"/>
          <path d="M12 10v6"/>
          <path d="M16 10v6"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 全屏画布 -->
  <canvas id="canvas"></canvas>

  <!-- 文字输入框 (隐藏，需要时显示) -->
  <textarea id="text-input" class="text-input" rows="1" placeholder="输入文字..."></textarea>

  <script src="renderer.js"></script>
</body>
</html>
