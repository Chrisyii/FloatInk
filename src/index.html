<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloatInk</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Floating Toolbar -->
  <div id="toolbar" class="toolbar">
    <!-- Color Selection -->
    <div class="toolbar-group colors">
      <button class="color-btn active" data-color="#FF3B30" style="background:#FF3B30" title="Red"></button>
      <button class="color-btn" data-color="#FF9500" style="background:#FF9500" title="Orange"></button>
      <button class="color-btn" data-color="#FFCC00" style="background:#FFCC00" title="Yellow"></button>
      <button class="color-btn" data-color="#34C759" style="background:#34C759" title="Green"></button>
      <button class="color-btn" data-color="#007AFF" style="background:#007AFF" title="Blue"></button>
      <button class="color-btn" data-color="#FFFFFF" style="background:#FFFFFF" title="White"></button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Tool Selection -->
    <div class="toolbar-group tools">
      <!-- Pen -->
      <button class="tool-btn active" data-tool="pen" title="Pen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z" />
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
          <path d="M2 2l7.586 7.586" />
          <circle cx="11" cy="11" r="2" />
        </svg>
      </button>

      <!-- Marker / Highlighter -->
      <button class="tool-btn" data-tool="marker" title="Highlighter">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.5 3.5L21 7l-12 12H5v-4L17.5 3.5z" />
          <path d="M15 6l3 3" />
          <line x1="3" y1="22" x2="11" y2="22" />
        </svg>
      </button>

      <!-- Arrow -->
      <button class="tool-btn" data-tool="arrow" title="Arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="19" x2="19" y2="5" />
          <polyline points="12 5 19 5 19 12" />
        </svg>
      </button>

      <!-- Checkmark -->
      <button class="tool-btn" data-tool="check" title="Checkmark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </button>

      <!-- Line -->
      <button class="tool-btn" data-tool="line" title="Line">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <line x1="4" y1="20" x2="20" y2="4" />
        </svg>
      </button>

      <!-- Rectangle -->
      <button class="tool-btn" data-tool="rect" title="Rectangle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
        </svg>
      </button>

      <!-- Ellipse -->
      <button class="tool-btn" data-tool="ellipse" title="Ellipse">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <ellipse cx="12" cy="12" rx="10" ry="7" />
        </svg>
      </button>

      <!-- Text -->
      <button class="tool-btn" data-tool="text" title="Text">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 20 4 20 7" />
          <line x1="9.5" y1="20" x2="14.5" y2="20" />
          <line x1="12" y1="4" x2="12" y2="20" />
        </svg>
      </button>

      <!-- Laser Pointer -->
      <button class="tool-btn" data-tool="laser" title="Laser Pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <line x1="12" y1="2" x2="12" y2="5" />
          <line x1="12" y1="19" x2="12" y2="22" />
          <line x1="2" y1="12" x2="5" y2="12" />
          <line x1="19" y1="12" x2="22" y2="12" />
          <line x1="4.93" y1="4.93" x2="7.05" y2="7.05" />
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07" />
          <line x1="4.93" y1="19.07" x2="7.05" y2="16.95" />
          <line x1="16.95" y1="7.05" x2="19.07" y2="4.93" />
        </svg>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Brush Size -->
    <div class="toolbar-group size-control">
      <span class="size-label">Size</span>
      <input id="size-slider" class="size-slider" type="range" min="1" max="24" step="1" value="3" title="Brush Size">
      <span id="size-value" class="size-value">3px</span>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Action Buttons -->
    <div class="toolbar-group actions">
      <!-- Undo -->
      <button class="tool-btn" id="undo-btn" title="Undo (⌘Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
        </svg>
      </button>

      <!-- Clear All -->
      <button class="tool-btn" id="clear-btn" title="Clear All Drawings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h13" />
          <path d="M8 6V4h8v2" />
          <path d="M7 6l1 14h8l1-14" />
          <path d="M12 10v6" />
          <path d="M16 10v6" />
        </svg>
      </button>

      <!-- Settings -->
      <button class="tool-btn" id="settings-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 .99-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51.99H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
      </button>

      <div id="inline-shortcut-settings" class="inline-shortcut-settings hidden">
        <span class="inline-shortcut-label">Toggle</span>
        <button id="shortcut-chip" class="shortcut-chip" title="Click to set shortcut">⌘⇧D</button>
      </div>
    </div>
  </div>

  <!-- Fullscreen Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Text Input (Hidden, shown when needed) -->
  <textarea id="text-input" class="text-input" rows="1" placeholder="Type text..."></textarea>

  <script src="renderer.js"></script>
</body>

</html>
